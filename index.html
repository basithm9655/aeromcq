<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Report PDF Generator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.js for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Custom scrollbar for a polished UI */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* * STRICT PDF EXPORT STYLES 
         * These styles apply to the dynamically created container 
         * before it gets converted to a PDF canvas.
         */
        .pdf-export-container {
            width: 800px; /* Force consistent desktop width for A4 proportion */
            background-color: white;
            color: black;
            font-family: 'Times New Roman', Times, serif;
            padding: 20px;
            box-sizing: border-box;
        }
        .pdf-export-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: underline;
            margin-bottom: 40px;
        }
        .pdf-export-figure {
            margin-bottom: 50px;
            text-align: center;
            page-break-inside: avoid; /* Prevents image cutting across 2 pages */
        }
        .pdf-export-img {
            max-width: 100%;
            max-height: 400px; /* Fits exactly 2 images per A4 page */
            object-fit: contain;
            margin: 0 auto 15px auto;
            display: block;
        }
        .pdf-export-caption {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }
        .pdf-export-footer {
            text-align: right;
            font-size: 16px;
            font-weight: bold;
            margin-top: 40px;
            padding-right: 20px;
            page-break-inside: avoid;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans p-4 md:p-8 selection:bg-indigo-200">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 relative">
        
        <!-- Premium Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-5 text-white flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="microscope" class="w-7 h-7 text-indigo-100"></i>
                <h1 class="text-2xl font-bold tracking-tight">Lab Report Generator</h1>
            </div>
            <div class="hidden md:block text-indigo-100 text-sm font-medium">
                Automated PDF Tool
            </div>
        </div>

        <div class="p-6 md:p-8">
            <!-- Global Information Form -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 pb-8 border-b border-slate-100">
                <div class="md:col-span-1">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Main Title</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="heading-1" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="mainTitle" value="EXPERIMENT 1" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Your Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="studentName" value="basith" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Roll Number</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="hash" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="rollNumber" value="25u201" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
            </div>

            <!-- Dynamic Figures Section -->
            <div class="mb-6 flex flex-col md:flex-row justify-between md:items-end gap-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="image" class="w-5 h-5 text-indigo-500"></i> Figures & Photos
                    </h2>
                    <p class="text-sm text-slate-500 mt-1">Upload your circuit screenshots and add their captions.</p>
                </div>
                <button onclick="addFigureRow()" class="flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-5 py-2.5 rounded-xl font-bold transition-colors text-sm border border-indigo-200 shadow-sm">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Figure
                </button>
            </div>

            <div id="figuresContainer" class="space-y-5">
                <!-- Figure rows will be injected here -->
            </div>

            <!-- Action Section -->
            <div class="mt-10 pt-8 border-t border-slate-100 flex flex-col items-center">
                <button onclick="generatePDF()" id="generateBtn" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-10 py-3.5 rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl w-full md:w-auto justify-center group">
                    <i data-lucide="file-down" class="w-6 h-6 group-hover:-translate-y-1 transition-transform"></i> Generate PDF Report
                </button>
                <div id="statusMsg" class="mt-4 flex items-center gap-2 text-indigo-600 font-semibold opacity-0 transition-opacity">
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing your PDF...
                </div>
            </div>

        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        let figureCounter = 0;

        // Function to add a new figure row
        function addFigureRow() {
            figureCounter++;
            const rowId = `figure-row-${figureCounter}`;
            
            const rowHTML = `
                <div id="${rowId}" class="bg-white border-2 border-dashed border-slate-200 p-5 rounded-2xl flex flex-col md:flex-row gap-5 items-start relative group hover:border-indigo-300 transition-colors">
                    
                    <div class="w-full md:w-1/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Upload Image</label>
                        <input type="file" accept="image/*" onchange="previewImage(this, 'preview-${figureCounter}')" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer transition-colors">
                        <input type="hidden" id="base64-${figureCounter}">
                    </div>
                    
                    <div class="w-full md:w-2/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Figure Caption</label>
                        <input type="text" id="caption-${figureCounter}" placeholder="e.g. Fig 6.1 LM317 Adjustable Voltage Regulator" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none text-sm transition-all">
                    </div>
                    
                    <button onclick="removeFigureRow('${rowId}')" class="md:absolute right-4 top-4 text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors mt-2 md:mt-0 ml-auto" title="Remove Figure">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>

                    <!-- Thumbnail Preview -->
                    <div class="w-full mt-4 hidden" id="preview-container-${figureCounter}">
                        <div class="relative inline-block">
                            <img id="preview-${figureCounter}" class="h-32 rounded-lg border shadow-sm object-cover bg-slate-50">
                            <div class="absolute inset-0 ring-1 ring-inset ring-black/10 rounded-lg"></div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('figuresContainer').insertAdjacentHTML('beforeend', rowHTML);
            lucide.createIcons();
        }

        // Function to remove a row
        function removeFigureRow(rowId) {
            const row = document.getElementById(rowId);
            row.style.opacity = '0';
            row.style.transform = 'scale(0.95)';
            setTimeout(() => row.remove(), 200); 
        }

        // Convert image to Base64
        function previewImage(inputElement, previewImgId) {
            const file = inputElement.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(previewImgId);
                    img.src = e.target.result;
                    document.getElementById(`preview-container-${previewImgId.split('-')[1]}`).classList.remove('hidden');
                    document.getElementById(`base64-${previewImgId.split('-')[1]}`).value = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // Function to generate and download the PDF reliably
        async function generatePDF() {
            const mainTitle = document.getElementById('mainTitle').value.trim() || 'EXPERIMENT';
            const studentName = document.getElementById('studentName').value.trim() || 'Student Name';
            const rollNumber = document.getElementById('rollNumber').value.trim() || 'Roll No';
            
            const rows = document.getElementById('figuresContainer').children;
            const figuresData = [];

            // Gather all image data
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const idNum = row.id.split('-')[2];
                const base64Input = document.getElementById(`base64-${idNum}`);
                const captionInput = document.getElementById(`caption-${idNum}`);
                
                if (base64Input && base64Input.value) {
                    figuresData.push({
                        image: base64Input.value,
                        caption: captionInput.value || `Figure ${i + 1}`
                    });
                }
            }

            if (figuresData.length === 0) {
                alert("Please upload at least one image before generating the PDF.");
                return;
            }

            // UI Loading State
            const btn = document.getElementById('generateBtn');
            const statusMsg = document.getElementById('statusMsg');
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-wait');
            statusMsg.classList.remove('opacity-0');

            try {
                // 1. Create an off-screen container that is VISIBLE to the rendering engine
                const container = document.createElement('div');
                container.className = 'pdf-export-container';
                // Position it completely out of view, but in the DOM (display: none kills html2canvas)
                container.style.position = 'absolute';
                container.style.left = '-9999px';
                container.style.top = '0';

                // 2. Build the HTML Structure
                let htmlContent = `<div class="pdf-export-title">${mainTitle}</div>`;

                figuresData.forEach(fig => {
                    htmlContent += `
                        <div class="pdf-export-figure">
                            <img class="pdf-export-img" src="${fig.image}" />
                            <div class="pdf-export-caption">${fig.caption}</div>
                        </div>
                    `;
                });

                htmlContent += `
                    <div class="pdf-export-footer">
                        ${studentName}<br>${rollNumber}
                    </div>
                `;

                container.innerHTML = htmlContent;
                document.body.appendChild(container);

                // Wait a tiny bit to ensure the browser has computed layouts for the base64 images
                await new Promise(r => setTimeout(r, 150)); 

                // 3. Configure html2pdf settings
                const opt = {
                    margin:       [15, 15, 15, 15], // mm margins [top, left, bottom, right]
                    filename:     `${mainTitle.replace(/\s+/g, '_')}_${rollNumber}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { 
                        scale: 2, 
                        useCORS: true,
                        windowWidth: 800, // Enforce a specific width for reading
                        logging: false 
                    },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] } // Strictly avoid breaking images
                };

                // 4. Generate & Save
                await html2pdf().set(opt).from(container).save();

                // 5. Cleanup the temporary container
                document.body.removeChild(container);

            } catch (error) {
                console.error("PDF Generation failed:", error);
                alert("An error occurred while generating the PDF. Please try again.");
            } finally {
                // Restore UI State
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-wait');
                statusMsg.classList.add('opacity-0');
            }
        }

        // Add 2 initial rows on load for convenience
        window.onload = () => {
            addFigureRow();
            addFigureRow();
        };
    </script>
</body>
</html>
