<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Report PDF Generator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.js for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Styles applied specifically to the PDF output */
        #pdf-render-area {
            font-family: 'Times New Roman', Times, serif;
            color: #000;
            background-color: #fff;
            padding: 20px;
        }
        
        .pdf-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-decoration: underline;
        }

        .pdf-student-info {
            text-align: right;
            font-size: 16px;
            font-weight: bold;
            margin-top: 50px;
            page-break-inside: avoid;
        }

        .pdf-figure {
            page-break-inside: avoid;
            margin-bottom: 40px;
            text-align: center;
        }

        .pdf-figure img {
            max-width: 100%;
            max-height: 400px; /* Ensures images fit on one page nicely */
            object-fit: contain;
            margin: 0 auto 10px auto;
            display: block;
        }

        .pdf-caption {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }

        /* Custom scrollbar for a polished UI */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans p-4 md:p-8 selection:bg-indigo-200">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        
        <!-- Premium Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-5 text-white flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="microscope" class="w-7 h-7 text-indigo-100"></i>
                <h1 class="text-2xl font-bold tracking-tight">Lab Report Generator</h1>
            </div>
            <div class="hidden md:block text-indigo-100 text-sm font-medium">
                Fast & Automated PDF Creation
            </div>
        </div>

        <div class="p-6 md:p-8">
            <!-- Global Information Form -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 pb-8 border-b border-slate-100">
                <div class="md:col-span-1">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Main Title</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="heading-1" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="mainTitle" placeholder="e.g. EXPERIMENT 1" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Your Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="studentName" placeholder="e.g. basith" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Roll Number</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="hash" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="rollNumber" placeholder="e.g. 25u201" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
            </div>

            <!-- Dynamic Figures Section -->
            <div class="mb-6 flex flex-col md:flex-row justify-between md:items-end gap-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="image" class="w-5 h-5 text-indigo-500"></i> Figures & Photos
                    </h2>
                    <p class="text-sm text-slate-500 mt-1">Upload your circuit screenshots and add their specific captions.</p>
                </div>
                <button onclick="addFigureRow()" class="flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-5 py-2.5 rounded-xl font-bold transition-colors text-sm border border-indigo-200 shadow-sm">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Figure
                </button>
            </div>

            <div id="figuresContainer" class="space-y-5">
                <!-- Initial Figure Row -->
            </div>

            <!-- Action Section -->
            <div class="mt-10 pt-8 border-t border-slate-100 flex flex-col items-center">
                <button onclick="generatePDF()" id="generateBtn" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-10 py-3.5 rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl w-full md:w-auto justify-center group transform hover:-translate-y-0.5">
                    <i data-lucide="file-down" class="w-6 h-6 group-hover:animate-bounce"></i> Generate PDF Report
                </button>
                <div id="statusMsg" class="mt-4 flex items-center gap-2 text-indigo-600 font-semibold hidden">
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing your PDF...
                </div>
            </div>

        </div>
    </div>

    <!-- Hidden Container for PDF Rendering -->
    <div style="display: none;">
        <div id="pdf-render-area">
            <!-- Content will be injected here dynamically -->
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Counter for unique IDs
        let figureCounter = 0;

        // Function to add a new figure row
        function addFigureRow() {
            figureCounter++;
            const rowId = `figure-row-${figureCounter}`;
            
            const rowHTML = `
                <div id="${rowId}" class="bg-white border-2 border-dashed border-slate-200 p-5 rounded-2xl flex flex-col md:flex-row gap-5 items-start relative group hover:border-indigo-300 transition-colors">
                    
                    <div class="w-full md:w-1/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Upload Image</label>
                        <input type="file" accept="image/*" onchange="previewImage(this, 'preview-${figureCounter}')" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer transition-colors">
                        <input type="hidden" id="base64-${figureCounter}">
                    </div>
                    
                    <div class="w-full md:w-2/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Figure Caption</label>
                        <input type="text" id="caption-${figureCounter}" placeholder="e.g. Fig 6.1 LM317 Adjustable Voltage Regulator" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none text-sm transition-all">
                    </div>
                    
                    <button onclick="removeFigureRow('${rowId}')" class="md:absolute right-4 top-4 text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors mt-2 md:mt-0 ml-auto" title="Remove Figure">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>

                    <!-- Thumbnail Preview -->
                    <div class="w-full mt-4 hidden" id="preview-container-${figureCounter}">
                        <div class="relative inline-block">
                            <img id="preview-${figureCounter}" class="h-32 rounded-lg border shadow-sm object-cover">
                            <div class="absolute inset-0 ring-1 ring-inset ring-black/10 rounded-lg"></div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('figuresContainer').insertAdjacentHTML('beforeend', rowHTML);
            lucide.createIcons(); // Re-initialize icons for new DOM elements
        }

        // Function to remove a row
        function removeFigureRow(rowId) {
            const row = document.getElementById(rowId);
            row.style.opacity = '0';
            row.style.transform = 'scale(0.95)';
            setTimeout(() => row.remove(), 200); // Smooth fade out
        }

        // Function to handle image selection and convert to Base64 (needed for PDF)
        function previewImage(inputElement, previewImgId) {
            const file = inputElement.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Show thumbnail
                    const img = document.getElementById(previewImgId);
                    img.src = e.target.result;
                    document.getElementById(`preview-container-${previewImgId.split('-')[1]}`).classList.remove('hidden');
                    
                    // Store base64 in hidden input
                    document.getElementById(`base64-${previewImgId.split('-')[1]}`).value = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // Function to generate and download the PDF
        async function generatePDF() {
            // 1. Gather Data
            const mainTitle = document.getElementById('mainTitle').value.trim() || 'EXPERIMENT';
            const studentName = document.getElementById('studentName').value.trim() || 'Student Name';
            const rollNumber = document.getElementById('rollNumber').value.trim() || 'Roll No';
            
            const rows = document.getElementById('figuresContainer').children;
            const figuresData = [];

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                // Extract the counter ID from the row's ID
                const idNum = row.id.split('-')[2];
                const base64Input = document.getElementById(`base64-${idNum}`);
                const captionInput = document.getElementById(`caption-${idNum}`);
                
                if (base64Input && base64Input.value) {
                    figuresData.push({
                        image: base64Input.value,
                        caption: captionInput.value || `Figure ${i + 1}`
                    });
                }
            }

            if (figuresData.length === 0) {
                alert("Please upload at least one image before generating the PDF.");
                return;
            }

            // 2. Build the PDF Layout DOM
            const pdfRenderArea = document.getElementById('pdf-render-area');
            pdfRenderArea.innerHTML = ''; // Clear previous

            // Add Header/Title (Centered at the top)
            const headerHTML = `
                <div class="pdf-title">${mainTitle}</div>
            `;
            pdfRenderArea.insertAdjacentHTML('beforeend', headerHTML);

            // Add Figures (Centered with captions)
            figuresData.forEach(fig => {
                const figHTML = `
                    <div class="pdf-figure">
                        <img src="${fig.image}" alt="${fig.caption}">
                        <div class="pdf-caption">${fig.caption}</div>
                    </div>
                `;
                pdfRenderArea.insertAdjacentHTML('beforeend', figHTML);
            });

            // Add Footer/Student Info (Bottom right, matching the uploaded PDF style)
            const footerHTML = `
                <div class="pdf-student-info">
                    ${studentName} <br> ${rollNumber}
                </div>
            `;
            pdfRenderArea.insertAdjacentHTML('beforeend', footerHTML);

            // 3. Setup html2pdf and trigger download
            const btn = document.getElementById('generateBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            statusMsg.classList.remove('hidden');

            const opt = {
                margin:       [20, 20, 20, 20], // Top, Left, Bottom, Right
                filename:     `${mainTitle.replace(/\s+/g, '_')}_${rollNumber}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Generate and save
            try {
                await html2pdf().set(opt).from(pdfRenderArea).save();
            } catch (error) {
                console.error("PDF Generation failed:", error);
                alert("An error occurred while generating the PDF. Please try again.");
            } finally {
                // Reset button state
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                statusMsg.classList.add('hidden');
            }
        }

        // Add one initial row when the page loads
        window.onload = () => {
            addFigureRow();
        };
    </script>
</body>
</html>
