<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Report PDF Generator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.js for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Custom scrollbar for a polished UI */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* * STRICT PDF EXPORT STYLES 
         * These styles ensure the PDF looks exactly like your reference document
         */
        .pdf-export-container {
            width: 800px; /* Force consistent desktop width for A4 proportion */
            background-color: white;
            color: black;
            font-family: 'Times New Roman', Times, serif;
            padding: 40px;
            box-sizing: border-box;
            position: absolute;
            left: -9999px; /* Keep it off-screen to avoid UI disruption */
            top: 0;
        }
        .pdf-export-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: underline;
            margin-bottom: 40px;
        }
        .pdf-export-figure {
            margin-bottom: 40px;
            text-align: center;
            page-break-inside: avoid; /* CRITICAL: Prevents image cutting across pages */
        }
        .pdf-export-img {
            max-width: 100%;
            max-height: 420px; /* Fits exactly 2 images per A4 page beautifully */
            object-fit: contain;
            margin: 0 auto 10px auto;
            display: block;
        }
        .pdf-export-caption {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }
        .pdf-export-footer {
            text-align: right;
            font-size: 16px;
            font-weight: bold;
            margin-top: 50px;
            page-break-inside: avoid;
        }
        
        /* Loading Overlay to prevent double clicks */
        #loadingOverlay {
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans p-4 md:p-8 selection:bg-indigo-200">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 relative">
        
        <!-- Premium Header -->
        <div class="bg-gradient-to-r from-indigo-700 to-indigo-500 px-6 py-5 text-white flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="file-check-2" class="w-7 h-7 text-indigo-100"></i>
                <h1 class="text-2xl font-bold tracking-tight">Automated Lab Report</h1>
            </div>
            <div class="hidden md:block text-indigo-100 text-sm font-medium bg-indigo-800/30 px-3 py-1 rounded-full border border-indigo-400/30">
                High-Quality PDF Engine
            </div>
        </div>

        <div class="p-6 md:p-8">
            <!-- Global Information Form -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 pb-8 border-b border-slate-100">
                <div class="md:col-span-1">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Main Title</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="heading-1" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="mainTitle" value="EXPERIMENT 1" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Your Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="studentName" value="basith" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Roll Number</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="hash" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="rollNumber" value="25u201" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all shadow-sm">
                    </div>
                </div>
            </div>

            <!-- Dynamic Figures Section -->
            <div class="mb-6 flex flex-col md:flex-row justify-between md:items-end gap-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="image" class="w-5 h-5 text-indigo-500"></i> Circuit Figures
                    </h2>
                    <p class="text-sm text-slate-500 mt-1">Upload screenshots and enter exact captions.</p>
                </div>
                <button onclick="addFigureRow()" class="flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-5 py-2.5 rounded-xl font-bold transition-colors text-sm border border-indigo-200 shadow-sm">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Figure
                </button>
            </div>

            <div id="figuresContainer" class="space-y-5">
                <!-- Figure rows will be injected here -->
            </div>

            <!-- Action Section -->
            <div class="mt-10 pt-8 border-t border-slate-100 flex justify-center">
                <button onclick="generatePDF()" id="generateBtn" class="flex items-center gap-3 bg-slate-800 hover:bg-slate-900 text-white px-12 py-4 rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl w-full md:w-auto justify-center group relative overflow-hidden">
                    <i data-lucide="download" class="w-6 h-6 group-hover:-translate-y-1 transition-transform"></i> 
                    <span>Generate PDF Document</span>
                </button>
            </div>
        </div>

        <!-- Full-screen loading overlay to prevent double generation -->
        <div id="loadingOverlay" class="absolute inset-0 bg-white/80 z-50 hidden flex-col items-center justify-center rounded-2xl">
            <i data-lucide="loader-2" class="w-12 h-12 text-indigo-600 animate-spin mb-4"></i>
            <p class="text-lg font-bold text-slate-800">Generating High-Quality PDF...</p>
            <p class="text-sm text-slate-500 mt-1">Please wait, arranging pages.</p>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        let figureCounter = 0;
        let isGenerating = false; // Lock variable to prevent double clicks

        // Function to add a new figure row
        function addFigureRow() {
            figureCounter++;
            const rowId = `figure-row-${figureCounter}`;
            
            const rowHTML = `
                <div id="${rowId}" class="bg-white border-2 border-dashed border-slate-200 p-5 rounded-2xl flex flex-col md:flex-row gap-5 items-start relative group hover:border-indigo-300 transition-colors">
                    
                    <div class="w-full md:w-1/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Upload Screenshot</label>
                        <input type="file" accept="image/*" onchange="previewImage(this, 'preview-${figureCounter}')" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer transition-colors">
                        <input type="hidden" id="base64-${figureCounter}">
                    </div>
                    
                    <div class="w-full md:w-2/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Figure Name / Caption</label>
                        <input type="text" id="caption-${figureCounter}" placeholder="e.g. Fig 6.1 LM317 Adjustable Voltage Regulator" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none text-sm transition-all font-medium text-slate-800">
                    </div>
                    
                    <button onclick="removeFigureRow('${rowId}')" class="md:absolute right-4 top-4 text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors mt-2 md:mt-0 ml-auto" title="Remove Figure">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>

                    <!-- Thumbnail Preview -->
                    <div class="w-full mt-4 hidden" id="preview-container-${figureCounter}">
                        <div class="relative inline-block">
                            <img id="preview-${figureCounter}" class="h-32 rounded-lg border shadow-sm object-cover bg-slate-50">
                            <div class="absolute inset-0 ring-1 ring-inset ring-black/10 rounded-lg pointer-events-none"></div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('figuresContainer').insertAdjacentHTML('beforeend', rowHTML);
            lucide.createIcons();
        }

        // Function to remove a row with animation
        function removeFigureRow(rowId) {
            const row = document.getElementById(rowId);
            row.style.opacity = '0';
            row.style.transform = 'scale(0.98)';
            row.style.transition = 'all 0.2s ease-out';
            setTimeout(() => row.remove(), 200); 
        }

        // Convert image to Base64 (Required for local PDF generation)
        function previewImage(inputElement, previewImgId) {
            const file = inputElement.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(previewImgId);
                    img.src = e.target.result;
                    document.getElementById(`preview-container-${previewImgId.split('-')[1]}`).classList.remove('hidden');
                    document.getElementById(`base64-${previewImgId.split('-')[1]}`).value = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // Function to generate and download the PDF securely
        async function generatePDF() {
            // Prevent double execution
            if (isGenerating) return; 
            
            const mainTitle = document.getElementById('mainTitle').value.trim() || 'EXPERIMENT';
            const studentName = document.getElementById('studentName').value.trim() || 'Student Name';
            const rollNumber = document.getElementById('rollNumber').value.trim() || 'Roll No';
            
            const rows = document.getElementById('figuresContainer').children;
            const figuresData = [];

            // Gather all image data and captions
            for (let i = 0; i < rows.length; i++) {
                const idNum = rows[i].id.split('-')[2];
                const base64Input = document.getElementById(`base64-${idNum}`);
                const captionInput = document.getElementById(`caption-${idNum}`);
                
                if (base64Input && base64Input.value) {
                    figuresData.push({
                        image: base64Input.value,
                        caption: captionInput.value || `Figure ${i + 1}`
                    });
                }
            }

            if (figuresData.length === 0) {
                alert("Please upload at least one image before generating your PDF.");
                return;
            }

            // Lock the UI
            isGenerating = true;
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            try {
                // 1. Create a dedicated off-screen container for rendering
                const container = document.createElement('div');
                container.className = 'pdf-export-container';

                // 2. Construct the HTML matching your required format
                let htmlContent = `<div class="pdf-export-title">${mainTitle}</div>`;

                figuresData.forEach(fig => {
                    htmlContent += `
                        <div class="pdf-export-figure">
                            <img class="pdf-export-img" src="${fig.image}" />
                            <div class="pdf-export-caption">${fig.caption}</div>
                        </div>
                    `;
                });

                htmlContent += `
                    <div class="pdf-export-footer">
                        ${studentName}<br>${rollNumber}
                    </div>
                `;

                container.innerHTML = htmlContent;
                document.body.appendChild(container);

                // Wait 300ms to ensure the browser strictly paints the DOM before capture
                await new Promise(resolve => setTimeout(resolve, 300)); 

                // 3. Configure html2pdf settings for "Best Generation"
                const opt = {
                    margin:       [20, 15, 20, 15], // Top, Left, Bottom, Right
                    filename:     `${mainTitle.replace(/\s+/g, '_')}_${rollNumber}.pdf`,
                    image:        { type: 'jpeg', quality: 1.0 }, // Max quality
                    html2canvas:  { 
                        scale: 3, // High resolution (3x scale) for crisp text/images
                        useCORS: true,
                        windowWidth: 800, // Enforce width to keep layout identical across devices
                        logging: false 
                    },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] } // Prevents cutting images in half
                };

                // 4. Generate & Save
                await html2pdf().set(opt).from(container).save();

                // 5. Cleanup
                document.body.removeChild(container);

            } catch (error) {
                console.error("PDF Generation failed:", error);
                alert("An error occurred. Please ensure your images are not corrupted and try again.");
            } finally {
                // Unlock UI
                isGenerating = false;
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        }

        // Add 2 initial rows on load for convenience
        window.onload = () => {
            addFigureRow();
            addFigureRow();
        };
    </script>
</body>
</html>
